<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHO Hypertension 2025 — MCQ Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F4EF;
  --bg2: #EFEAE0;
  --bg3: #E5DDD0;
  --card: #FDFCFA;
  --border: #D8CEBF;
  --border2: #C8BAA8;
  --text: #1A1714;
  --text2: #5C5248;
  --text3: #9C8E80;
  --green: #1B6E4F;
  --green-bg: #EAF4EE;
  --green-border: #A8D4B8;
  --red: #8B2020;
  --red-bg: #FAEAEA;
  --red-border: #D4A8A8;
  --blue: #1A3A6B;
  --blue-bg: #EAF0FA;
  --blue-border: #A8C0E0;
  --amber: #7A4A00;
  --amber-bg: #FDF3E0;
  --amber-border: #E8C878;
  --accent: #C45A1A;
  --radius: 12px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ── HERO ── */
.hero {
  background: var(--text);
  color: var(--bg);
  padding: 56px 24px 48px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 70% 30%, #C45A1A22 0%, transparent 60%),
              radial-gradient(ellipse at 20% 80%, #1B6E4F22 0%, transparent 60%);
}
.hero-eyebrow {
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 16px;
  position: relative;
}
.hero h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(28px, 5vw, 46px);
  line-height: 1.15;
  margin-bottom: 14px;
  position: relative;
}
.hero h1 em {
  color: var(--accent);
  font-style: italic;
}
.hero-sub {
  font-size: 15px;
  color: #B8AFA8;
  max-width: 480px;
  margin: 0 auto 32px;
  line-height: 1.6;
  position: relative;
}
.stats-row {
  display: flex;
  justify-content: center;
  gap: 32px;
  flex-wrap: wrap;
  position: relative;
}
.stat {
  text-align: center;
}
.stat-num {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  color: #fff;
}
.stat-lbl {
  font-size: 11px;
  color: #A09888;
  letter-spacing: 0.05em;
  margin-top: 2px;
}

/* ── FILTERS ── */
.filters-wrap {
  max-width: 740px;
  margin: 28px auto 0;
  padding: 0 16px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.fbtn {
  padding: 7px 16px;
  border: 1px solid var(--border2);
  border-radius: 100px;
  background: var(--card);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text2);
  cursor: pointer;
  transition: all .18s;
  font-weight: 400;
}
.fbtn:hover { background: var(--bg3); }
.fbtn.active {
  background: var(--text);
  color: var(--bg);
  border-color: var(--text);
}

/* ── PROGRESS ── */
.progress-wrap {
  max-width: 740px;
  margin: 20px auto 0;
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.pbar {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.pfill {
  height: 100%;
  background: var(--green);
  border-radius: 2px;
  transition: width .5s ease;
  width: 0%;
}
.ptext {
  font-size: 12px;
  color: var(--text3);
  white-space: nowrap;
}

/* ── QUESTIONS ── */
.qlist {
  max-width: 740px;
  margin: 24px auto 0;
  padding: 0 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.qcard {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  transition: border-color .2s;
}
.qcard:hover { border-color: var(--border2); }

.qmeta {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.qnum {
  font-size: 11px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 20px;
  background: var(--bg2);
  color: var(--text3);
}
.qtag {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 20px;
  font-weight: 500;
}
.tag-Clinical    { background: var(--blue-bg);  color: var(--blue); }
.tag-Public      { background: var(--green-bg); color: var(--green); }
.tag-Pharmacology{ background: var(--amber-bg); color: var(--amber); }
.tag-Epidemiology{ background: var(--bg3);      color: var(--text2); }
.done-badge {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 20px;
  background: var(--green-bg);
  color: var(--green);
  font-weight: 500;
}

.scenario {
  border-left: 3px solid var(--accent);
  background: var(--bg);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 12px 14px;
  margin-bottom: 16px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text2);
  font-style: italic;
}

.question {
  font-size: 15.5px;
  font-weight: 500;
  line-height: 1.55;
  margin-bottom: 14px;
  color: var(--text);
}

.opts { display: flex; flex-direction: column; gap: 8px; }
.obtn {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 14px;
  cursor: pointer;
  text-align: left;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  line-height: 1.55;
  transition: all .15s;
  width: 100%;
}
.obtn:hover:not(:disabled) {
  background: var(--bg2);
  border-color: var(--border2);
}
.obtn:disabled { cursor: default; }
.obtn.correct {
  background: var(--green-bg);
  border-color: var(--green-border);
  color: var(--green);
}
.obtn.wrong {
  background: var(--red-bg);
  border-color: var(--red-border);
  color: var(--red);
}
.olbl {
  font-weight: 600;
  min-width: 20px;
  flex-shrink: 0;
}

.expl {
  margin-top: 14px;
  padding: 14px 16px;
  background: var(--bg);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-size: 13.5px;
  color: var(--text2);
  line-height: 1.7;
  display: none;
  animation: fadeIn .3s ease;
}
.expl.show { display: block; }
.expl strong { color: var(--text); font-weight: 600; }
.ref {
  font-size: 11.5px;
  color: var(--text3);
  margin-top: 10px;
  font-style: italic;
}

/* ── SCORE ── */
.score-panel {
  max-width: 740px;
  margin: 0 auto;
  padding: 0 16px;
  display: none;
}
.score-panel.show { display: block; }
.score-card {
  background: var(--text);
  color: var(--bg);
  border-radius: var(--radius);
  padding: 40px 32px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.score-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 0%, #C45A1A18 0%, transparent 60%);
}
.score-eyebrow {
  font-size: 11px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
  position: relative;
}
.score-big {
  font-family: 'DM Serif Display', serif;
  font-size: 64px;
  color: #fff;
  line-height: 1;
  position: relative;
}
.score-of {
  font-size: 22px;
  color: #A09888;
}
.score-msg {
  font-size: 15px;
  color: #C8C0B8;
  max-width: 440px;
  margin: 16px auto 0;
  line-height: 1.6;
  position: relative;
}
.breakdown {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 10px;
  margin-top: 24px;
  position: relative;
}
.bitem {
  background: #2A2522;
  border-radius: var(--radius-sm);
  padding: 14px 10px;
}
.bnum { font-size: 22px; font-weight: 600; }
.blbl { font-size: 11px; color: #908880; margin-top: 3px; }
.restart-btn {
  margin-top: 24px;
  padding: 12px 32px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 100px;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: opacity .15s;
  position: relative;
}
.restart-btn:hover { opacity: .88; }

/* ── EMPTY ── */
.empty { padding: 40px; text-align: center; color: var(--text3); font-size: 14px; }

@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }

@media (max-width: 480px) {
  .hero { padding: 40px 16px 36px; }
  .stats-row { gap: 20px; }
  .qcard { padding: 18px; }
  .score-card { padding: 28px 20px; }
}
</style>
</head>

    opts:['ACE inhibitors, ARBs, calcium channel blockers, thiazide diuretics, and beta-blockers','Alpha-blockers, loop diuretics, central agents, nitrates, and ACE inhibitors','Only ACE inhibitors and ARBs — other classes have insufficient evidence','Beta-blockers and alpha-blockers are the priority; others are second-line only'],

const CAT_COLORS = {
  Clinical: '#1A3A6B',
  'Public Health': '#1B6E4F',
  Pharmacology: '#7A4A00',
  Epidemiology: '#5C5248'
};

let answered = new Array(ALL.length).fill(null);
let score = { total: 0, Clinical: 0, 'Public Health': 0, Pharmacology: 0, Epidemiology: 0 };
const catTotal = { Clinical: 0, 'Public Health': 0, Pharmacology: 0, Epidemiology: 0 };
ALL.forEach(q => catTotal[q.cat]++);
let activeFilter = 'all';

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuestions();
}

function updateProgress() {
  const n = answered.filter(v => v !== null).length;
  document.getElementById('pfill').style.width = (n / ALL.length * 100) + '%';
  document.getElementById('ptext').textContent = n + ' / ' + ALL.length + ' answered';
  if (n === ALL.length) showScore();
}

function renderQuestions() {
  const list = document.getElementById('qlist');
  list.innerHTML = '';
  const visible = ALL.filter(q => activeFilter === 'all' || q.cat === activeFilter);
  if (!visible.length) {
    list.innerHTML = '<div class="empty">No questions in this category.</div>';
    return;
  }
  visible.forEach(q => {
    const i = ALL.indexOf(q);
    const tagClass = 'tag-' + q.cat.replace(' ', '');
    const card = document.createElement('div');
    card.className = 'qcard';
    card.id = 'card-' + i;
    card.innerHTML = `
      <div class="qmeta">
        <span class="qnum">Q${i + 1}</span>
        <span class="qtag ${tagClass}">${q.cat}</span>
        <span class="qtag" style="background:var(--bg2);color:var(--text3)">${q.tag}</span>
        ${answered[i] !== null ? '<span class="done-badge">✓ Answered</span>' : ''}
      </div>
      <div class="scenario">${q.scenario}</div>
      <div class="question">${q.q}</div>
      <div class="opts" id="opts-${i}">
        ${['A','B','C','D'].map((l, j) => `
          <button class="obtn" onclick="doAnswer(${i},${j})" id="ob-${i}-${j}" ${answered[i] !== null ? 'disabled' : ''}>
            <span class="olbl">${l})</span><span>${q.opts[j]}</span>
          </button>`).join('')}
      </div>
      <div class="expl ${answered[i] !== null ? 'show' : ''}" id="exp-${i}">
        ${q.expl}<div class="ref">📄 ${q.ref}</div>
      </div>`;
    if (answered[i] !== null) setTimeout(() => applyStyle(i, answered[i], q.ans), 10);
    list.appendChild(card);
  });
}

function applyStyle(i, chosen, correct) {
  for (let j = 0; j < 4; j++) {
    const b = document.getElementById('ob-' + i + '-' + j);
    if (!b) continue;
    if (j === correct) b.classList.add('correct');
    else if (j === chosen && chosen !== correct) b.classList.add('wrong');
  }
}

function doAnswer(i, chosen) {
  if (answered[i] !== null) return;
  answered[i] = chosen;
  const q = ALL[i];
  if (chosen === q.ans) { score.total++; score[q.cat]++; }
  applyStyle(i, chosen, q.ans);
  for (let j = 0; j < 4; j++) {
    const b = document.getElementById('ob-' + i + '-' + j);
    if (b) b.disabled = true;
  }
  document.getElementById('exp-' + i).classList.add('show');
  const meta = document.querySelector('#card-' + i + ' .qmeta');
  if (meta && !meta.querySelector('.done-badge')) {
    const badge = document.createElement('span');
    badge.className = 'done-badge';
    badge.textContent = '✓ Answered';
    meta.appendChild(badge);
  }
  updateProgress();
}

function showScore() {
  const panel = document.getElementById('score-panel');
  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  const pct = score.total / ALL.length;
  document.getElementById('score-big').innerHTML = score.total + '<span class="score-of">/' + ALL.length + '</span>';
  const msgs = [
    [0.875, 'Outstanding! You have an excellent command of the WHO 2025 Hypertension Report across clinical and public health domains.'],
    [0.7,   'Well done! Strong performance. Review the explanations for any missed questions to consolidate your knowledge.'],
    [0.5,   'Good effort. Focus on the areas where you lost points — particularly the interaction between clinical management and public health policy.'],
    [0,     'Keep studying. Use the detailed explanations to revisit key WHO concepts. You can do it!']
  ];
  document.getElementById('score-msg').textContent = msgs.find(m => pct >= m[0])[1];
  const cats = ['Clinical', 'Public Health', 'Pharmacology', 'Epidemiology'];
  document.getElementById('breakdown').innerHTML = cats.map(c => `
    <div class="bitem">
      <div class="bnum" style="color:${CAT_COLORS[c]||'#fff'};filter:brightness(1.8)">${score[c]}/${catTotal[c]}</div>
      <div class="blbl">${c}</div>
    </div>`).join('');
}

function restart() {
  answered = new Array(ALL.length).fill(null);
  score = { total: 0, Clinical: 0, 'Public Health': 0, Pharmacology: 0, Epidemiology: 0 };
  document.getElementById('score-panel').classList.remove('show');
  updateProgress();
  renderQuestions();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderQuestions();
updateProgress();
</script>
</body>
</html>
